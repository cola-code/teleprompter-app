<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>提词器</title>
  <style>
    :root {
      --bg: #000;
      --panel: rgba(18, 18, 18, 0.94);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #fff;
      --muted: #a8a8a8;
      --accent: #4f9cff;
      --accent-strong: #77b5ff;
      --control: #1f1f1f;
      --control-hover: #2a2a2a;
      --danger: #ff6b6b;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background:
        radial-gradient(circle at top, rgba(79, 156, 255, 0.12), transparent 32rem),
        #000;
    }

    .controls {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(15rem, 1fr) auto auto auto minmax(13rem, 18rem);
      gap: 0.75rem;
      align-items: center;
      padding: 0.85rem;
      background: var(--panel);
      border-bottom: 1px solid var(--panel-border);
      backdrop-filter: blur(16px);
    }

    .button {
      appearance: none;
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      background: var(--control);
      color: var(--text);
      min-height: 2.6rem;
      padding: 0 1rem;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
      white-space: nowrap;
    }

    .button:hover {
      background: var(--control-hover);
      border-color: rgba(255, 255, 255, 0.22);
    }

    .button:active {
      transform: translateY(1px);
    }

    .button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #03101f;
    }

    .button.primary:hover {
      background: var(--accent-strong);
      border-color: var(--accent-strong);
    }

    .button.danger {
      color: var(--danger);
    }

    .stat {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.25;
      min-width: 0;
    }

    .stat strong {
      display: block;
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .speed {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.65rem;
      align-items: center;
      color: var(--muted);
      font-size: 0.9rem;
      min-width: 0;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(18rem, 28rem) 1fr;
      min-height: 0;
      flex: 1;
    }

    .editor {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.035);
    }

    .editor label {
      padding: 1rem 1rem 0.6rem;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    textarea {
      flex: 1;
      width: 100%;
      min-height: 12rem;
      resize: none;
      border: 0;
      outline: 0;
      padding: 0 1rem 1rem;
      background: transparent;
      color: var(--text);
      font: 1rem/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    textarea::placeholder {
      color: #747474;
    }

    .stage {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      background:
        linear-gradient(to bottom, #000 0%, transparent 14%, transparent 86%, #000 100%),
        #000;
    }

    .prompt-window {
      position: relative;
      width: min(100%, 62rem);
      height: 100%;
      overflow: hidden;
      padding: clamp(4rem, 9vh, 7rem) clamp(1.25rem, 5vw, 4rem);
    }

    .script {
      margin: 0 auto;
      max-width: 18ch;
      min-height: calc(100% + clamp(4rem, 9vh, 7rem));
      color: var(--text);
      font-size: clamp(2.4rem, 6.2vw, 6.5rem);
      line-height: 1.22;
      font-weight: 750;
      letter-spacing: 0;
      text-align: center;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      text-wrap: pretty;
      will-change: transform;
      transform: translate3d(0, 0, 0);
    }

    .empty-state {
      color: rgba(255, 255, 255, 0.38);
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .app {
        min-height: 100vh;
        height: auto;
      }

      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .stat,
      .speed {
        grid-column: 1 / -1;
      }

      .workspace {
        grid-template-columns: 1fr;
        min-height: calc(100vh - 12rem);
      }

      .editor {
        height: 16rem;
        border-right: 0;
        border-bottom: 1px solid var(--panel-border);
      }

      .stage {
        height: calc(100vh - 16rem);
        min-height: 30rem;
      }
    }

    @media (max-width: 520px) {
      .controls {
        gap: 0.5rem;
        padding: 0.65rem;
      }

      .button {
        padding: 0 0.7rem;
        min-height: 2.45rem;
        font-size: 0.92rem;
      }

      .script {
        max-width: 13ch;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="controls" aria-label="提词器控制栏">
      <div class="stat">
        预计阅读时间
        <strong id="readingTime">0 分 00 秒</strong>
      </div>

      <button class="button primary" id="startButton" type="button">开始</button>
      <button class="button" id="pauseButton" type="button" disabled>暂停</button>
      <button class="button" id="fullscreenButton" type="button">全屏</button>

      <label class="speed" for="speedRange">
        <span>慢</span>
        <input id="speedRange" type="range" min="180" max="900" step="10" value="450" />
        <span id="speedValue">450 字/分钟</span>
      </label>
    </section>

    <section class="workspace">
      <aside class="editor">
        <label for="scriptInput">文字</label>
        <textarea id="scriptInput" spellcheck="true" placeholder="在这里粘贴或输入你的文字..."></textarea>
      </aside>

      <section class="stage" aria-label="提词器显示区">
        <div class="prompt-window" id="promptWindow">
          <div class="script empty-state" id="scriptDisplay">你的文字会显示在这里。</div>
        </div>
      </section>
    </section>
  </main>

  <script>
    (() => {
      const scriptInput = document.getElementById("scriptInput");
      const scriptDisplay = document.getElementById("scriptDisplay");
      const promptWindow = document.getElementById("promptWindow");
      const startButton = document.getElementById("startButton");
      const pauseButton = document.getElementById("pauseButton");
      const fullscreenButton = document.getElementById("fullscreenButton");
      const speedRange = document.getElementById("speedRange");
      const speedValue = document.getElementById("speedValue");
      const readingTime = document.getElementById("readingTime");

      let animationId = null;
      let animationStartTime = 0;
      let elapsedBeforePause = 0;
      let isRunning = false;
      let isPaused = false;
      let durationMs = 0;
      let totalTravel = 0;

      const state = {
        get text() {
          return scriptInput.value.trim();
        },
        get charactersPerMinute() {
          return Number(speedRange.value);
        }
      };

      function getReadableCharacterCount(text) {
        return Array.from(text).filter((character) => {
          return /[\p{L}\p{N}\u4e00-\u9fff]/u.test(character);
        }).length;
      }

      function formatDuration(seconds) {
        const minutes = Math.floor(seconds / 60);
        const remainingSeconds = Math.max(0, Math.round(seconds % 60));
        return `${minutes} 分 ${String(remainingSeconds).padStart(2, "0")} 秒`;
      }

      function calculateDurationMs() {
        const characters = getReadableCharacterCount(scriptInput.value);
        return characters ? (characters / state.charactersPerMinute) * 60000 : 0;
      }

      function updateReadingTime() {
        const seconds = calculateDurationMs() / 1000;
        readingTime.textContent = formatDuration(seconds);
        speedValue.textContent = `${state.charactersPerMinute} 字/分钟`;
      }

      function updateDisplay() {
        const text = scriptInput.value.trim();

        if (!text) {
          scriptDisplay.textContent = "你的文字会显示在这里。";
          scriptDisplay.classList.add("empty-state");
        } else {
          scriptDisplay.textContent = text;
          scriptDisplay.classList.remove("empty-state");
        }

        if (!isRunning) {
          setOffset(0);
        }

        updateReadingTime();
      }

      function setOffset(offset) {
        scriptDisplay.style.transform = `translate3d(0, ${-offset}px, 0)`;
      }

      function measureScroll() {
        const style = window.getComputedStyle(promptWindow);
        const topPadding = parseFloat(style.paddingTop) || 0;
        const bottomPadding = parseFloat(style.paddingBottom) || 0;
        const visibleHeight = promptWindow.clientHeight - topPadding - bottomPadding;
        totalTravel = Math.max(0, scriptDisplay.scrollHeight - visibleHeight + bottomPadding);
        durationMs = Math.max(1, calculateDurationMs());
      }

      function currentProgress(now = performance.now()) {
        if (!isRunning) return 0;
        const elapsed = isPaused ? elapsedBeforePause : now - animationStartTime;
        return Math.min(1, Math.max(0, elapsed / durationMs));
      }

      function stopScroll() {
        cancelAnimationFrame(animationId);
        animationId = null;
        animationStartTime = 0;
        elapsedBeforePause = 0;
        isRunning = false;
        isPaused = false;
        pauseButton.disabled = true;
        pauseButton.textContent = "暂停";
        startButton.textContent = "开始";
      }

      function scrollFrame(timestamp) {
        if (!isRunning || isPaused) {
          return;
        }

        const progress = currentProgress(timestamp);
        setOffset(totalTravel * progress);

        if (progress >= 1) {
          stopScroll();
          return;
        }

        animationId = requestAnimationFrame(scrollFrame);
      }

      function startScroll() {
        updateDisplay();

        if (!state.text) {
          scriptInput.focus();
          return;
        }

        cancelAnimationFrame(animationId);
        measureScroll();
        setOffset(0);
        isRunning = true;
        isPaused = false;
        elapsedBeforePause = 0;
        animationStartTime = performance.now();
        pauseButton.disabled = false;
        pauseButton.textContent = "暂停";
        startButton.textContent = "重新开始";
        animationId = requestAnimationFrame(scrollFrame);
      }

      function togglePause() {
        if (!isRunning) return;

        isPaused = !isPaused;
        pauseButton.textContent = isPaused ? "继续" : "暂停";

        if (isPaused) {
          cancelAnimationFrame(animationId);
          animationId = null;
          elapsedBeforePause = performance.now() - animationStartTime;
          return;
        }

        animationStartTime = performance.now() - elapsedBeforePause;
        animationId = requestAnimationFrame(scrollFrame);
      }

      async function toggleFullscreen() {
        try {
          if (!document.fullscreenElement) {
            await document.documentElement.requestFullscreen();
            fullscreenButton.textContent = "退出全屏";
          } else {
            await document.exitFullscreen();
            fullscreenButton.textContent = "全屏";
          }
        } catch {
          fullscreenButton.textContent = "全屏";
        }
      }

      scriptInput.addEventListener("input", () => {
        updateDisplay();

        if (!isRunning) {
          setOffset(0);
        } else {
          const progress = currentProgress();
          measureScroll();
          animationStartTime = performance.now() - progress * durationMs;
          setOffset(totalTravel * progress);
        }
      });

      speedRange.addEventListener("input", () => {
        const progress = currentProgress();
        updateReadingTime();

        if (isRunning) {
          measureScroll();
          const adjustedElapsed = progress * durationMs;

          if (isPaused) {
            elapsedBeforePause = adjustedElapsed;
          } else {
            animationStartTime = performance.now() - adjustedElapsed;
          }
        }
      });

      window.addEventListener("resize", () => {
        if (!isRunning) return;

        const progress = currentProgress();
        measureScroll();
        setOffset(totalTravel * progress);
      });

      startButton.addEventListener("click", startScroll);
      pauseButton.addEventListener("click", togglePause);
      fullscreenButton.addEventListener("click", toggleFullscreen);

      document.addEventListener("fullscreenchange", () => {
        fullscreenButton.textContent = document.fullscreenElement ? "退出全屏" : "全屏";
      });

      document.addEventListener("keydown", (event) => {
        if (event.target === scriptInput) return;

        if (event.code === "Space") {
          event.preventDefault();
          isRunning ? togglePause() : startScroll();
        }

        if (event.key === "Escape" && isRunning) {
          stopScroll();
        }
      });

      updateDisplay();
    })();
  </script>
</body>
</html>
