<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal Teleprompter</title>
  <style>
    :root {
      --bg: #000;
      --panel: rgba(18, 18, 18, 0.94);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #fff;
      --muted: #a8a8a8;
      --accent: #4f9cff;
      --accent-strong: #77b5ff;
      --control: #1f1f1f;
      --control-hover: #2a2a2a;
      --danger: #ff6b6b;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background:
        radial-gradient(circle at top, rgba(79, 156, 255, 0.12), transparent 32rem),
        #000;
    }

    .controls {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(15rem, 1fr) auto auto auto minmax(13rem, 18rem);
      gap: 0.75rem;
      align-items: center;
      padding: 0.85rem;
      background: var(--panel);
      border-bottom: 1px solid var(--panel-border);
      backdrop-filter: blur(16px);
    }

    .button {
      appearance: none;
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      background: var(--control);
      color: var(--text);
      min-height: 2.6rem;
      padding: 0 1rem;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
      white-space: nowrap;
    }

    .button:hover {
      background: var(--control-hover);
      border-color: rgba(255, 255, 255, 0.22);
    }

    .button:active {
      transform: translateY(1px);
    }

    .button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #03101f;
    }

    .button.primary:hover {
      background: var(--accent-strong);
      border-color: var(--accent-strong);
    }

    .button.danger {
      color: var(--danger);
    }

    .stat {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.25;
      min-width: 0;
    }

    .stat strong {
      display: block;
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .speed {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.65rem;
      align-items: center;
      color: var(--muted);
      font-size: 0.9rem;
      min-width: 0;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(18rem, 28rem) 1fr;
      min-height: 0;
      flex: 1;
    }

    .editor {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.035);
    }

    .editor label {
      padding: 1rem 1rem 0.6rem;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    textarea {
      flex: 1;
      width: 100%;
      min-height: 12rem;
      resize: none;
      border: 0;
      outline: 0;
      padding: 0 1rem 1rem;
      background: transparent;
      color: var(--text);
      font: 1rem/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    textarea::placeholder {
      color: #747474;
    }

    .stage {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      background:
        linear-gradient(to bottom, #000 0%, transparent 14%, transparent 86%, #000 100%),
        #000;
    }

    .prompt-window {
      width: min(100%, 62rem);
      height: 100%;
      overflow: hidden;
      padding: clamp(4rem, 9vh, 7rem) clamp(1.25rem, 5vw, 4rem);
      scroll-behavior: auto;
    }

    .script {
      margin: 0 auto;
      max-width: 18ch;
      min-height: 100%;
      color: var(--text);
      font-size: clamp(2.4rem, 6.2vw, 6.5rem);
      line-height: 1.22;
      font-weight: 750;
      letter-spacing: 0;
      text-align: center;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      text-wrap: pretty;
    }

    .empty-state {
      color: rgba(255, 255, 255, 0.38);
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .app {
        min-height: 100vh;
        height: auto;
      }

      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .stat,
      .speed {
        grid-column: 1 / -1;
      }

      .workspace {
        grid-template-columns: 1fr;
        min-height: calc(100vh - 12rem);
      }

      .editor {
        height: 16rem;
        border-right: 0;
        border-bottom: 1px solid var(--panel-border);
      }

      .stage {
        height: calc(100vh - 16rem);
        min-height: 30rem;
      }
    }

    @media (max-width: 520px) {
      .controls {
        gap: 0.5rem;
        padding: 0.65rem;
      }

      .button {
        padding: 0 0.7rem;
        min-height: 2.45rem;
        font-size: 0.92rem;
      }

      .script {
        max-width: 13ch;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="controls" aria-label="Teleprompter controls">
      <div class="stat">
        Reading time
        <strong id="readingTime">0 min 00 sec</strong>
      </div>

      <button class="button primary" id="startButton" type="button">Start</button>
      <button class="button" id="pauseButton" type="button" disabled>Pause</button>
      <button class="button" id="fullscreenButton" type="button">Fullscreen</button>

      <label class="speed" for="speedRange">
        <span>Slow</span>
        <input id="speedRange" type="range" min="250" max="1400" step="25" value="700" />
        <span>Fast</span>
      </label>
    </section>

    <section class="workspace">
      <aside class="editor">
        <label for="scriptInput">Script</label>
        <textarea id="scriptInput" spellcheck="true" placeholder="Paste or type your script here..."></textarea>
      </aside>

      <section class="stage" aria-label="Teleprompter display">
        <div class="prompt-window" id="promptWindow">
          <div class="script empty-state" id="scriptDisplay">Your script will appear here.</div>
        </div>
      </section>
    </section>
  </main>

  <script>
    (() => {
      const scriptInput = document.getElementById("scriptInput");
      const scriptDisplay = document.getElementById("scriptDisplay");
      const promptWindow = document.getElementById("promptWindow");
      const startButton = document.getElementById("startButton");
      const pauseButton = document.getElementById("pauseButton");
      const fullscreenButton = document.getElementById("fullscreenButton");
      const speedRange = document.getElementById("speedRange");
      const readingTime = document.getElementById("readingTime");

      let animationId = null;
      let lastFrameTime = null;
      let isRunning = false;
      let isPaused = false;

      const state = {
        get text() {
          return scriptInput.value.trim();
        },
        get charactersPerMinute() {
          return Number(speedRange.value);
        },
        get pixelsPerSecond() {
          return state.charactersPerMinute / 18;
        }
      };

      function formatDuration(seconds) {
        const minutes = Math.floor(seconds / 60);
        const remainingSeconds = Math.max(0, Math.round(seconds % 60));
        return `${minutes} min ${String(remainingSeconds).padStart(2, "0")} sec`;
      }

      function updateReadingTime() {
        const characters = scriptInput.value.length;
        const seconds = characters ? (characters / state.charactersPerMinute) * 60 : 0;
        readingTime.textContent = formatDuration(seconds);
      }

      function updateDisplay() {
        const text = scriptInput.value.trim();

        if (!text) {
          scriptDisplay.textContent = "Your script will appear here.";
          scriptDisplay.classList.add("empty-state");
        } else {
          scriptDisplay.textContent = text;
          scriptDisplay.classList.remove("empty-state");
        }

        updateReadingTime();
      }

      function stopScroll() {
        cancelAnimationFrame(animationId);
        animationId = null;
        lastFrameTime = null;
        isRunning = false;
        isPaused = false;
        pauseButton.disabled = true;
        pauseButton.textContent = "Pause";
        startButton.textContent = "Start";
      }

      function scrollFrame(timestamp) {
        if (!isRunning || isPaused) {
          lastFrameTime = timestamp;
          animationId = requestAnimationFrame(scrollFrame);
          return;
        }

        if (lastFrameTime === null) {
          lastFrameTime = timestamp;
        }

        const deltaSeconds = (timestamp - lastFrameTime) / 1000;
        lastFrameTime = timestamp;
        promptWindow.scrollTop += state.pixelsPerSecond * deltaSeconds;

        const reachedEnd =
          promptWindow.scrollTop + promptWindow.clientHeight >= promptWindow.scrollHeight - 1;

        if (reachedEnd) {
          stopScroll();
          return;
        }

        animationId = requestAnimationFrame(scrollFrame);
      }

      function startScroll() {
        updateDisplay();

        if (!state.text) {
          scriptInput.focus();
          return;
        }

        cancelAnimationFrame(animationId);
        promptWindow.scrollTop = 0;
        isRunning = true;
        isPaused = false;
        lastFrameTime = null;
        pauseButton.disabled = false;
        pauseButton.textContent = "Pause";
        startButton.textContent = "Restart";
        animationId = requestAnimationFrame(scrollFrame);
      }

      function togglePause() {
        if (!isRunning) return;

        isPaused = !isPaused;
        pauseButton.textContent = isPaused ? "Resume" : "Pause";
        lastFrameTime = null;
      }

      async function toggleFullscreen() {
        try {
          if (!document.fullscreenElement) {
            await document.documentElement.requestFullscreen();
            fullscreenButton.textContent = "Exit Fullscreen";
          } else {
            await document.exitFullscreen();
            fullscreenButton.textContent = "Fullscreen";
          }
        } catch {
          fullscreenButton.textContent = "Fullscreen";
        }
      }

      scriptInput.addEventListener("input", () => {
        updateDisplay();

        if (!isRunning) {
          promptWindow.scrollTop = 0;
        }
      });

      speedRange.addEventListener("input", updateReadingTime);
      startButton.addEventListener("click", startScroll);
      pauseButton.addEventListener("click", togglePause);
      fullscreenButton.addEventListener("click", toggleFullscreen);

      document.addEventListener("fullscreenchange", () => {
        fullscreenButton.textContent = document.fullscreenElement ? "Exit Fullscreen" : "Fullscreen";
      });

      document.addEventListener("keydown", (event) => {
        if (event.target === scriptInput) return;

        if (event.code === "Space") {
          event.preventDefault();
          isRunning ? togglePause() : startScroll();
        }

        if (event.key === "Escape" && isRunning) {
          stopScroll();
        }
      });

      updateDisplay();
    })();
  </script>
</body>
</html>
